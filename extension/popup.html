<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="robin.css" />
    <title>Robin</title>
  </head>
  <body class="robin-popup">
    <header class="robin-head">
      <div class="robin-wordmark">
        <svg class="robin-logo" width="22" height="22" viewBox="0 0 40 40" fill="none" aria-hidden="true"><path class="rl-body" d="M7 14 L2 9 L10 16 Z"/><path class="rl-body" d="M27 11c-7-2-15 2-17 9-1 4 1 8 6 9 6 1 13-1 16-6 3-5 2-10-5-12Z"/><path class="rl-breast" d="M16 19c-2 3-2 6 0 8 3 1.6 7 1.2 10-0.6-2.6-3-6.4-5.6-10-7.4Z"/><path class="rl-beak" d="M27 11l7-1-6 4Z"/><circle class="rl-eye" cx="26.5" cy="14.5" r="1.4"/></svg>
        <span class="robin-name">Robin</span>
      </div>
      <p class="robin-tag">A path into Bitcoin open source.</p>
    </header>

    <section class="robin-intake">
      <div class="robin-label">Quick presets</div>
      <div id="robin-presets" class="robin-presets"></div>

      <div id="robin-gh" class="robin-gh"></div>

      <div class="robin-label">Target repo</div>
      <select id="robin-repo" class="robin-input robin-mono"></select>

      <div class="robin-label">Your goal</div>
      <textarea id="robin-goals" class="robin-input" rows="2" placeholder="What do you want to work on, and why?"></textarea>

      <button id="robin-go" class="robin-go">Find my path</button>
    </section>

    <section id="robin-out" class="robin-out"></section>

    <footer class="robin-foot">
      <a id="robin-options" href="#" class="robin-foot-link">
        <svg class="robin-ico" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Settings
      </a>
    </footer>

    <script src="presets.js"></script>
    <script src="render.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
