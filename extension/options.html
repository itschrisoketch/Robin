<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="robin.css" />
    <title>Robin — settings</title>
  </head>
  <body class="robin-popup" style="width: 460px">
    <header class="robin-head">
      <div class="robin-wordmark">
        <svg class="robin-logo" width="22" height="22" viewBox="0 0 40 40" fill="none" aria-hidden="true"><path class="rl-body" d="M7 14 L2 9 L10 16 Z"/><path class="rl-body" d="M27 11c-7-2-15 2-17 9-1 4 1 8 6 9 6 1 13-1 16-6 3-5 2-10-5-12Z"/><path class="rl-breast" d="M16 19c-2 3-2 6 0 8 3 1.6 7 1.2 10-0.6-2.6-3-6.4-5.6-10-7.4Z"/><path class="rl-beak" d="M27 11l7-1-6 4Z"/><circle class="rl-eye" cx="26.5" cy="14.5" r="1.4"/></svg>
        <span class="robin-name">Robin</span>
      </div>
      <p class="robin-tag">Settings</p>
    </header>
    <section class="robin-intake">
      <div class="robin-label">Backend URL</div>
      <input id="robin-backend" class="robin-input robin-mono" placeholder="http://localhost:3000" />
      <p class="robin-tag" style="font-style: normal; font-family: inherit; font-size: 11.5px; margin-top: 8px">
        Where your Robin Next.js app runs. The OpenRouter and GitHub keys live
        there, never in this extension. For the demo, run <span class="robin-mono">pnpm dev</span> and use the default.
      </p>
      <button id="robin-save" class="robin-go">Save</button>
      <p id="robin-saved" class="robin-tag" style="display: none; color: var(--orange)">Saved.</p>
    </section>
    <footer class="robin-foot">
      <a class="robin-foot-link" href="https://www.buildwithrobin.xyz/privacy" target="_blank" rel="noopener noreferrer">Privacy policy</a>
    </footer>
    <script src="options.js"></script>
  </body>
</html>
